<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOD Signup — Admin</title>
<style>
  :root {
    --navy: #1a3a6e;
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #d8dde6;
    --text: #1a1f2b;
    --muted: #6b7585;
    --green: #197d4a;
    --green-bg: #e6f4ec;
    --amber: #b8721a;
    --amber-bg: #fdf2e0;
    --red: #b3261e;
    --red-bg: #fdecea;
    --blue-bg: #e7eef9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--navy);
    color: white;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links { display: flex; gap: 12px; align-items: center; }
  header a, header button {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 12px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
  }
  header a:hover, header button:hover { background: rgba(255,255,255,0.25); }

  main { max-width: 1400px; margin: 0 auto; padding: 20px 16px 60px; }

  #loading { text-align: center; padding: 80px; color: var(--muted); }
  #not-admin { text-align: center; padding: 80px; color: var(--red); }

  .summary {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--navy); }

  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar input[type=search] {
    flex: 1;
    min-width: 240px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }
  .toolbar button {
    background: var(--navy);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .toolbar button:hover { background: #122a52; }
  .toolbar button.secondary { background: white; color: var(--navy); border: 1px solid var(--border); }
  .toolbar button.secondary:hover { background: #f0f3f8; }

  /* slot grid view */
  .slot-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .slot-block-header {
    background: var(--navy);
    color: white;
    padding: 10px 16px;
    font-weight: 600;
  }
  .slot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .ws-block {
    background: var(--card);
    padding: 10px 14px;
  }
  .ws-block-title { font-weight: 600; font-size: 13px; }
  .ws-block-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .ws-block-count {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .ws-block-count.ok    { background: var(--green-bg); color: var(--green); }
  .ws-block-count.warn  { background: var(--amber-bg); color: var(--amber); }
  .ws-block-count.full  { background: var(--red-bg); color: var(--red); }
  .ws-block ul { list-style: none; padding: 0; margin: 0; }
  .ws-block li {
    font-size: 12px;
    padding: 2px 0;
    color: var(--text);
    border-top: 1px solid var(--bg);
  }
  .ws-block li:first-child { border-top: none; }

  /* table view */
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  th, td { padding: 8px 12px; text-align: left; font-size: 13px; }
  th {
    background: var(--navy);
    color: white;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  th:hover { background: #122a52; }
  tr:nth-child(even) { background: #fafbfc; }
  tr:hover { background: var(--blue-bg); }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .view-toggle button {
    background: white;
    color: var(--navy);
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  .view-toggle button.active { background: var(--navy); color: white; }

  .hint { color: var(--muted); font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>TOD Signup · Admin</h1>
  <div class="links">
    <a href="/">← Signup view</a>
    <a href="/print">⎙ Attendance sheets</a>
    <span id="admin-email" style="font-size:13px;opacity:0.85"></span>
    <button id="signout-btn">Sign out</button>
  </div>
</header>

<main id="app">
  <div id="loading">Loading…</div>
  <div id="not-admin" hidden>
    <h2>Not authorised</h2>
    <p>You're signed in but your account isn't in the admin list. Contact the site administrator if you should have access.</p>
  </div>

  <div id="content" hidden>
    <div class="summary" id="summary"></div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search by name or email…">
      <div class="view-toggle">
        <button id="view-grid" class="active">Grid view</button>
        <button id="view-table">Table view</button>
      </div>
      <button id="refresh">↻ Refresh</button>
      <button id="export-csv-by-slot" class="secondary">⬇ CSV by slot</button>
      <button id="export-csv-by-staff" class="secondary">⬇ CSV by staff</button>
    </div>

    <div id="grid-view"></div>
    <div id="table-view" hidden></div>

    <p class="hint">Counts update on refresh. Last loaded: <span id="loaded-at"></span></p>
  </div>
</main>

<script src="config.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

  const SB = createClient(
    window.SUPABASE_CONFIG.url,
    window.SUPABASE_CONFIG.publishableKey,
    { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
  );

  const $ = (s) => document.querySelector(s);

  let workshops = [];
  let slots = [];
  let registrations = [];
  let seats = [];
  let view = 'grid';
  let searchTerm = '';

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  async function main() {
    const { data: { session } } = await SB.auth.getSession();
    if (!session) {
      // Not signed in — punt to signup page
      location.href = '/';
      return;
    }

    $('#admin-email').textContent = session.user.email;

    try {
      const [workshopsR, slotsR, regsR, seatsR] = await Promise.all([
        SB.from('workshops').select('*').order('display_order'),
        SB.from('slots').select('*').order('id'),
        SB.rpc('admin_get_all_registrations'),
        SB.rpc('get_session_seats'),
      ]);

      if (regsR.error) {
        // Most likely: not an admin
        if (regsR.error.message?.includes('forbidden') || regsR.error.code === 'P0001') {
          $('#loading').hidden = true;
          $('#not-admin').hidden = false;
          return;
        }
        throw regsR.error;
      }

      workshops = workshopsR.data;
      slots = slotsR.data;
      registrations = regsR.data;
      seats = seatsR.data;

      $('#loading').hidden = true;
      $('#content').hidden = false;
      render();
    } catch (e) {
      console.error(e);
      $('#loading').innerHTML = '<p style="color:var(--red)">Could not load admin data: ' + escapeHtml(e.message || e) + '</p>';
    }
  }

  function render() {
    renderSummary();
    if (view === 'grid') renderGrid(); else renderTable();
    $('#loaded-at').textContent = new Date().toLocaleString('en-NZ');
  }

  function renderSummary() {
    const totalRegs = registrations.length;
    const uniqueStaff = new Set(registrations.map(r => r.user_email)).size;
    const totalCapacity = seats.reduce((a, s) => a + s.capacity, 0);
    const totalTaken = seats.reduce((a, s) => a + s.taken, 0);
    const fullSessions = seats.filter(s => s.taken >= s.capacity).length;

    $('#summary').innerHTML = `
      <div class="stat"><span class="stat-label">Registered staff</span><span class="stat-value">${uniqueStaff}</span></div>
      <div class="stat"><span class="stat-label">Total picks made</span><span class="stat-value">${totalRegs}</span></div>
      <div class="stat"><span class="stat-label">Seats taken</span><span class="stat-value">${totalTaken} / ${totalCapacity}</span></div>
      <div class="stat"><span class="stat-label">Sessions full</span><span class="stat-value">${fullSessions} / ${seats.length}</span></div>
    `;
  }

  function renderGrid() {
    $('#grid-view').hidden = false;
    $('#table-view').hidden = true;

    // Group registrations by slot+workshop
    const bySlotWorkshop = {};
    for (const r of registrations) {
      const key = `${r.slot_id}::${r.workshop_id}`;
      (bySlotWorkshop[key] ||= []).push(r);
    }

    const filterMatches = (r) => {
      if (!searchTerm) return true;
      const q = searchTerm.toLowerCase();
      return (r.user_email || '').toLowerCase().includes(q)
          || (r.user_name || '').toLowerCase().includes(q);
    };

    const html = slots.map(slot => {
      const cards = workshops.map(w => {
        const key = `${slot.id}::${w.id}`;
        const all = bySlotWorkshop[key] || [];
        const filtered = all.filter(filterMatches);
        const seat = seats.find(s => s.slot_id === slot.id && s.workshop_id === w.id);
        const cap = seat ? seat.capacity : 25;
        const taken = all.length;
        let countClass = 'ok';
        if (taken >= cap) countClass = 'full';
        else if (taken >= cap * 0.8) countClass = 'warn';

        const list = filtered
          .sort((a, b) => (a.user_name || a.user_email).localeCompare(b.user_name || b.user_email))
          .map(r => `<li>${escapeHtml(r.user_name || r.user_email)}</li>`)
          .join('');

        const dimmed = searchTerm && filtered.length === 0 ? 'opacity:0.3;' : '';

        return `
          <div class="ws-block" style="${dimmed}">
            <div class="ws-block-title">${escapeHtml(w.title)}</div>
            <div class="ws-block-meta">${escapeHtml(w.presenter)} · ${escapeHtml(w.room)}</div>
            <div class="ws-block-count ${countClass}">${taken} / ${cap}</div>
            <ul>${list || '<li style="color:var(--muted);font-style:italic">—</li>'}</ul>
          </div>
        `;
      }).join('');

      return `
        <div class="slot-block">
          <div class="slot-block-header">${escapeHtml(slot.label)}</div>
          <div class="slot-grid">${cards}</div>
        </div>
      `;
    }).join('');

    $('#grid-view').innerHTML = html;
  }

  function renderTable() {
    $('#grid-view').hidden = true;
    $('#table-view').hidden = false;

    const q = searchTerm.toLowerCase();
    const rows = registrations
      .filter(r => !q
        || (r.user_email || '').toLowerCase().includes(q)
        || (r.user_name || '').toLowerCase().includes(q))
      .sort((a, b) => sortKey(a).localeCompare(sortKey(b)) || a.slot_id - b.slot_id);

    if (rows.length === 0) {
      $('#table-view').innerHTML = '<p>No registrations match.</p>';
      return;
    }

    $('#table-view').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Slot</th>
            <th>Workshop</th>
            <th>Presenter</th>
            <th>Room</th>
            <th>Registered at</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${escapeHtml(r.user_name || '')}</td>
              <td>${escapeHtml(r.user_email)}</td>
              <td>${escapeHtml(r.slot_label)}</td>
              <td>${escapeHtml(r.title)}</td>
              <td>${escapeHtml(r.presenter)}</td>
              <td>${escapeHtml(r.room)}</td>
              <td>${new Date(r.created_at).toLocaleString('en-NZ')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  // Stable sort key for a registration row — falls back through email to never
  // hit null and avoids the "name on row A, email on row B" inconsistency.
  function sortKey(r) {
    const name = (r.user_name || '').trim();
    const email = (r.user_email || '').toLowerCase();
    return name ? name.toLowerCase() + '|' + email : email;
  }

  function exportCSV(mode) {
    const headers = ['Name', 'Email', 'Slot', 'Start time', 'Workshop', 'Presenter', 'Room', 'Registered at'];
    const rows = [...registrations];
    if (mode === 'by-staff') {
      rows.sort((a, b) =>
        sortKey(a).localeCompare(sortKey(b))
        || a.slot_id - b.slot_id
      );
    } else {
      // by-slot (default): order by slot, then workshop display order, then name
      rows.sort((a, b) =>
        a.slot_id - b.slot_id
        || (workshops.find(w => w.id === a.workshop_id)?.display_order || 0)
         - (workshops.find(w => w.id === b.workshop_id)?.display_order || 0)
        || sortKey(a).localeCompare(sortKey(b))
      );
    }
    const escape = (v) => {
      const s = (v == null) ? '' : String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const csv = [
      headers.join(','),
      ...rows.map(r => [
        r.user_name, r.user_email, r.slot_label, r.start_time,
        r.title, r.presenter, r.room, r.created_at
      ].map(escape).join(','))
    ].join('\r\n');

    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
    a.href = url;
    a.download = `tod-registrations-${mode}-${stamp}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Wire UI
  $('#signout-btn').addEventListener('click', async () => {
    await SB.auth.signOut();
    location.href = '/';
  });
  $('#refresh').addEventListener('click', main);
  $('#export-csv-by-slot').addEventListener('click', () => exportCSV('by-slot'));
  $('#export-csv-by-staff').addEventListener('click', () => exportCSV('by-staff'));
  $('#search').addEventListener('input', (e) => {
    searchTerm = e.target.value.trim();
    render();
  });
  $('#view-grid').addEventListener('click', () => {
    view = 'grid';
    $('#view-grid').classList.add('active');
    $('#view-table').classList.remove('active');
    render();
  });
  $('#view-table').addEventListener('click', () => {
    view = 'table';
    $('#view-table').classList.add('active');
    $('#view-grid').classList.remove('active');
    render();
  });

  main();
</script>

</body>
</html>
