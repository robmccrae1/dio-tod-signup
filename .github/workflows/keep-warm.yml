name: Keep Supabase Warm

# Free Supabase projects pause after 7 days of inactivity. This workflow
# pings the database once a day so it stays awake while registration is open.

on:
  schedule:
    # 14:00 UTC = 02:00 NZST (NZDT in winter shifts to 01:00 UTC ≠ 13:00 UTC).
    # Cadence is what matters; exact local time isn't critical.
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is not set."
            exit 1
          fi
          # /auth/v1/health needs the apikey header (it's not as "open" as it
          # sounds). With apikey it returns 200 and exercises GoTrue + db.
          health=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "Auth health: $health"
          if [ "$health" -ge 400 ]; then
            echo "::error::Supabase auth health returned HTTP $health"
            exit 1
          fi
          # Also exercise PostgREST + RPC, which is the path the app actually uses.
          # get_session_seats is grant-execute to authenticated, so we send the
          # anon key as a Bearer token (Supabase treats this as anon role + jwt).
          rpc=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/rpc/get_session_seats" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "RPC ping: $rpc"
          # We expect 401 (anon can't call this RPC) or 200; both prove the DB
          # is awake. We only fail on 5xx or 0 (network).
          if [ "$rpc" -ge 500 ] || [ "$rpc" -eq 0 ]; then
            echo "::error::Supabase RPC ping returned HTTP $rpc"
            exit 1
          fi
